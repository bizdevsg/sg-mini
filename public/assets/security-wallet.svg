<svg width="700" height="700" viewBox="0 0 700 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="walletBody" x1="120" y1="120" x2="580" y2="560" gradientUnits="userSpaceOnUse">
